<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OAuth Callback - HuggingFace Dataset Exporter</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      background: #f5f5f5;
    }

    .message {
      text-align: center;
      padding: 40px;
      background: white;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
    }

    .spinner {
      border: 3px solid #f3f3f3;
      border-top: 3px solid #ff9d00;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
      margin: 0 auto 20px;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    h2 {
      margin: 0 0 8px 0;
      color: #1a1a1a;
    }

    p {
      margin: 0;
      color: #666;
      font-size: 14px;
    }

    .error {
      color: #c62828;
    }
  </style>
</head>
<body>
  <div class="message">
    <div class="spinner"></div>
    <h2>Authentication successful</h2>
    <p id="status">Completing sign-in...</p>
  </div>

  <script>
    // Extract OAuth parameters from URL
    const params = new URLSearchParams(window.location.search);
    const code = params.get('code');
    let state = params.get('state');
    const error = params.get('error');
    const errorDescription = params.get('error_description');

    // HuggingFace may return state as a JSON string, parse it
    if (state) {
      try {
        const parsedState = JSON.parse(state);
        if (typeof parsedState === 'object' && parsedState.state) {
          console.log('Callback: State is JSON object, extracting nested state');
          state = parsedState.state;
        }
      } catch (e) {
        // Not JSON, use as-is
        console.log('Callback: State is plain string');
      }
    }

    if (error) {
      // Handle OAuth error
      document.getElementById('status').textContent = errorDescription || error;
      document.getElementById('status').classList.add('error');
      document.querySelector('.spinner').style.display = 'none';

      // Send error to parent window
      if (window.opener) {
        window.opener.postMessage({
          error: error,
          error_description: errorDescription
        }, '*');
      }

      // Close window after delay
      setTimeout(() => {
        window.close();
      }, 3000);

    } else if (code && state) {
      // Send authorization code to parent window
      console.log('Callback: window.opener exists?', !!window.opener);
      console.log('Callback: sending postMessage with code and state');

      if (window.opener) {
        window.opener.postMessage({
          code: code,
          state: state
        }, '*');

        console.log('Callback: postMessage sent successfully');
      } else {
        // Fallback: Use localStorage when window.opener is null
        console.log('Callback: window.opener is null, using localStorage fallback');
        localStorage.setItem('hf_oauth_callback', JSON.stringify({
          code: code,
          state: state,
          timestamp: Date.now()
        }));
        console.log('Callback: saved to localStorage');
      }

      // Close the popup
      setTimeout(() => {
        console.log('Callback: closing popup now');
        window.close();
      }, 1000);

    } else {
      // Missing required parameters
      document.getElementById('status').textContent = 'Invalid OAuth callback parameters';
      document.getElementById('status').classList.add('error');
      document.querySelector('.spinner').style.display = 'none';
    }
  </script>
</body>
</html>
