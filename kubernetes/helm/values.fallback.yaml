# Values used by the fallback website (cluster HX). The HX cluster has 3 workers.
# The resources of this cluster will be divided as follows:
# - Public website (requires 46GB of RAM)
# - Export app (requires 16GB of RAM)
# - Rfam (requires 5GB of RAM)
#
# Using 67GB of RAM out of a total of 96GB

# Database
database: db-fb-pg-16

# Proxy
proxy: proxy-hx

# RNAcentral
rnacentralReplicas: 1

# Allowed hosts (in addition to rnacentral.org domains hardcoded in settings.py)
allowedHosts: ".caas.ebi.ac.uk"

# Disable SSL redirect so the site is accessible over plain HTTP on NodePort
djangoDebug: "True"
